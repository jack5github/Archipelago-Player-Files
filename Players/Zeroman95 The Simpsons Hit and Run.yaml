name: ZeromanSHAR{NUMBER}

description: Zeroman95s The Simpsons Hit and Run YAML

game: The Simpsons Hit And Run
requires:
  version: 0.6.6

The Simpsons Hit And Run:
  progression_balancing: # This was originally on 0 when I first begun, BIG Mistake that was. So now it is at 50.
    50: 99

  accessibility: # Unchanged
    full: 50
    minimal: 0

  goal: # No way would I be doing ALL the Missions in the game; That is like 90% of the whole game.
    goal_all_story_missions_complete: 99

  levelsanity: # Set to levels because linear is boring.
    linear: 0
    levels: 50

  startingcarshuffle: # Set to have a random car when starting.
    'false': 0
    'true': 50

  shuffleattack: # Unchanged
    ['All']

  shufflejump: # Unchanged
    ['All']

  startjumplevel: # Pick how many Jumps I should start with randomly.
    random-range-0-2: 99

  shufflegagfinder: # Unchanged
    ['All']

  shufflecheckeredflags: # Unchanged
    ['All']

  shuffleebrake: # Unchanged
    ['All']

  shuffleforward: # Unchanged
    ['None']

  earlyforward: # Unchanged
    ['All']

  EnableWaspPercent: # Unchanged
    'false': 0
    'true': 50

  wasppercent: # Pick between 50 to 100 Wasps. So I am not here grinding checks forever.
    random-range-50-100: 99

  EnableCardPercent: # Unchanged
    'false': 0
    'true': 50

  cardpercent: # Happy to have less Cards required then Wasps.
    random-range-10-100: 99

  shufflecards: # Unchanged
    'false': 0
    'true': 50

  cardlogic: # Cars are allowed to get Cards.
    cars: 99

  wasplogic: # Adds a Item to the pool called Frink-o-Matic Wasp Bumper when this is obtained Cars will be allowed to destroy Wasp Cameras.
    unlockable: 99

  missionlocks: # We'll give this a go.
    random-range-25-50: 99

  minprice: # Let's make Shop Pricing completely random.
    random-range-0-500: 99

  maxprice: # Let's make Shop Pricing completely random.
    random-range-0-500: 99

  shopscalemod: # Unchanged
    2: 99

  shophintpolicy: # Unchanged
    all: 99

  extrahintpolicy: # Unchanged
    'false': 0
    'true': 50

  shuffletraffic: # Unchanged
    'false': 0
    'true': 50

  filler_traps: # I always have all my games only have 25% of their filler be traps.
    25: 99

  eject: # Unchanged
    'false': 0
    'true': 50

  duff: # Unchanged
    'false': 0
    'true': 50

  launch: # Unchanged
    'false': 0
    'true': 50

  hnr: # Unchanged
    'false': 0
    'true': 50

  traffictrap: # Unchanged
    'false': 0
    'true': 50

  local_items: []

  non_local_items: []

  start_inventory: {}

  start_hints: []

  start_location_hints: []

  exclude_locations: []

  priority_locations: []

  item_links: []

  plando_items: []
