    rainbow_valley: 0
    thunder_rock: 0 # (WARNING: NO WATER)
    whispering_cliffs: 0
    three_monkeys_park: 0
    canary_mines: 0 # (WARNING: NO WATER)
    barony_bridge: 0
    funtopia: 0
    haunted_harbor: 0
    fun_fortress: 0
    future_world: 0
    gentle_glen: 0
    jolly_jungle: 0 # (WARNING: UNREASONABLE)
    hydro_hills: 0
    sprightly_park: 0
    magic_quarters: 0
    fruit_farm: 0
    butterfly_dam: 0
    coaster_canyon: 0
    thunderstorm_park: 0
    harmonic_hills: 0
    roman_village: 0
    swamp_cove: 0
    adrenaline_heights: 0
    utopia_park: 0
    rotting_heights: 0
    fiasco_forest: 0
    pickle_park: 0
    giggle_downs: 0
    mineral_park: 0
    coaster_crazy: 0
    urban_park: 0 # (WARNING: UNREASONABLE)
    geoffery_gardens: 0
    iceberg_islands: 0
    volcania: 0
    arid_heights: 0
    razor_rocks: 0
    crater_lake: 0
    vertigo_views: 0
    big_pier_2: 0 # Paradise Pier 2 (WARNING: UNREASONABLE)
    dragons_cove: 0
    good_knight_park: 0
    wacky_warren: 0
    grand_glacier: 0
    crazy_craters: 0
    dusty_desert: 0
    woodworm_park: 0
    icarus_park: 0
    sunny_swamps: 0
    frightmare_hills: 0
