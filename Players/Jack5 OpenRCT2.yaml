name: Jack5RCT2{NUMBER}
description: |-
  Jack5's OpenRCT2 player file

  This RollerCoaster Tycoon 2 configuration intends to maximise the perceived variety of the game within each new Archipelago run, while minimising the difficulty of the game, as it has a rather hardcore-oriented community. In particular, scenarios with unique terrain are favoured over flat ones, stat randomisation is kept low to ensure a consistent experience, and the win conditions have had their requirement chances adjusted. There is also a 10% chance of Monopoly Mode occurring.
game: OpenRCT2
requires:
  version: 0.6.6
  game:
    OpenRCT2: 0.1.20
OpenRCT2:
  ################
  # Game Options #
  ################
  progression_balancing:
    # Unchanged from the base configuration.
    random-range-0-99: 50
  accessibility:
    # Unchanged from the base configuration.
    full: 50
    minimal: 50
  ignore_ride_stat_changes:
    # Disables changes to base ride stats. If enabled, rides will always behave like they do in the base game.
    # Unchanged from the base configuration.
    'false': 50
    'true': 0
  death_link:
    # If you die, everybody dies, and vise versa!
    # This manifests itself in exploding rides. Somebody dying will cause a random ride to crash, and building rides badly will cause others to die. There's a 20 second timer between deathlink events.
    # Fix that coaster quickly! This option can be enabled/disabled in game as well by typing !!toggledeathlink in the chat tab of the unlock shop.
    # Unchanged from the base configuration.
    disabled: 0
    enabled: 50
  ####################
  # Scenario Options #
  ####################
  scenario:
    # Choose which scenario you'd like to play! Random won't choose scenarios that are unreasonably difficult/tedious.
    # Future updates will allow custom scenarios.
    # The full scenario list can be found starting from https://rct.fandom.com/wiki/The_Complete_Scenario_List#RollerCoaster_Tycoon_2. All interesting scenarios are given a weight of 5, while all non-interesting but compatible scenarios are given a weight of 2 (1 if shared between built and non-built versions).
    random_rct1: 0
    random_loopy_landscapes: 0
    random_corkscrew_follies: 0
    random_rct2: 0
    random_wacky_worlds: 0
    random_time_twister: 0
    random_rct1_expansions: 0
    random_rct2_expansions: 0
    # **Archipelago**
    archipelago_madness_vanilla: 0
    archipelago_madness_expansions: 5
    # **RollerCoaster Tycoon 1**
    forest_frontiers: 0
    dynamite_dunes: 0 # (WARNING: NO WATER)
    leafy_lake: 0
