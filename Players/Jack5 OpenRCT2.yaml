    # **Extras**
    mega_park: 0
    fort_anachronism: 0
    build_your_own_six_flags_belgium: 1
    build_your_own_six_flags_great_adventure: 1
    build_your_own_six_flags_holland: 1
    build_your_own_six_flags_magic_mountain: 1
    build_your_own_six_flags_park: 2
    build_your_own_six_flags_over_texas: 1
  difficulty:
    # Choose a difficulty for the randomization. This will make rides have more difficult stat results (If that's enabled), as well as affect things like the loan interest rate.
    # Reduced from Medium, as I am no RollerCoaster Tycoon freak, just someone that enjoys the game.
    very_easy: 0
    easy: 33
    medium: 33
    hard: 33
    extreme: 0
  scenario_length:
    # Choose how long this game will last. This will affect things such as unlock shop prices and if prerequisites are required before purchase. It's recommended to choose based on how long other worlds in the multi-world take to complete.
    # Synchronous Short: Around 2 hours to complete.
    # Synchronous Long: Around 4 hours to complete.
    # Lengthy: Recommended for Asyncs.
    # Marathon: Recommended for Asyncs.
    # Unchanged from the base configuration.
    synchronous_short: 50
    synchronous_long: 0
    lengthy: 0
    marathon: 0
  randomization_range:
    # Influences how spread random values will be (Mostly this affects the excitement, intensity, and nausea ratings). The more extreme this value, the more extreme the difficulty will swing, with easy becoming much easier and hard becoming much more difficult.
    # I have tried this a couple of times on Low, and I feel like the randomisation isn't enough, so I've increased it to Medium.
    none: 0
    low: 0
    medium: 33
    high: 33
    extreme: 33
  randomize_park_values:
    # Randomizes values such as starting cash, starting bank loan amount, and the max bank loan
    # Unchanged from the base configuration.
    'false': 0
    'true': 50
  preferred_intensity:
    # Choose a preferred intensity for your guests. Less intense will limit guests to a maximum of 4 intensity, and more intense will limit guests to a minimum of 8 intensity in most circumstances. Normal is highly recommended for most players! Seriously, unless you really know what you are doing and want the (likely very tedious) challenge, you shouldn't change this.
    # Unchanged from the base configuration.
    less_intense: 0
    normal: 50
    more_intense: 0
  stat_rerolls:
    # How often to re-randomize the stats for ride types. Build the Theme Park of Theseus!
    # Never re-roll ride statistics.
    never: 50
    infrequent: 0
    semi_frequent: 0
    frequent: 0
    very_frequent: 0
    extremely_frequent: 0
  ################
  # Goal Options #
  ################
  guest_objective:
    # Choose how many guests are required to win the scenario
    # You can define additional values between the minimum and maximum values. Minimum value is 1, maximum value is 7500.
    # For all of these goal options, I have made them range randomly between their default and 10% less.
    random-range-900-2000: 50
  park_value_objective:
    # If enabled, choose what park value (In USD) is required to win the scenario.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 1000000.
    # For all of these goal options, I have made them range randomly between their default and 10% less.
    random-range-180000-30000: 50
  roller_coaster_objective:
    # If enabled, choose how many coasters, and what prerequisites they need to beat the scenario.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 20.
    # For all of these goal options, I have made them range randomly between their default and 10% less.
    random-range-4-10: 50
  roller_coaster_excitement:
    # Select the minimum excitement 😀 for a coaster to count towards your objective. 0 will disable a minimum excitement rating.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 9.
    # For all of these goal options, I have made them range randomly between their default and 10% less. This option has the possibility of being higher, because it is easy to achieve. This should NEVER be higher than 7.
    random-range-4-7: 50
  roller_coaster_intensity:
    # Select the minimum intensity 😬 for a coaster to count towards your objective. 0 will disable a minimum intensity rating.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 9.
    # For all of these goal options, I have made them range randomly between their default and 10% less. This option has the possibility of being higher, because it is easy to achieve. This should NEVER be higher than 5.
    random-range-4-5: 50
  roller_coaster_nausea:
    # Select the minimum nausea 🤢 for a coaster to count towards your objective. 0 will disable a minimum nausea rating.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 6.
    # For all of these goal options, I have made them range randomly between their default and 10% less. This should NEVER be higher than 5.
    random-range-3-5: 50
  required_unique_rides:
    # Requires specific rides to be built before scenario completion is awarded. These will tend to appear in the later half of the game.
    # It's highly recommended to have this set to at least 1!
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 10.
    # For all of these goal options, I have made them range randomly between their default and 10% less. This option has the possibility of being even lower, as building lots of roller coasters is more of an annoyance than a challenge.
    random-range-3-5: 50
  park_rating_objective:
    # If enabled, choose the minimum park rating needed to beat the scenario.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 999.
    # For all of these goal options, I have made them range randomly between their default and 10% less.
    random-range-720-999: 50
  pay_off_loan:
    # Require Loan to be paid off before scenario completion is awarded. Multiple objectives can be enabled!
    # Unchanged from the base configuration.
    'false': 0
    'true': 50
  monopoly_mode:
    # Monopoly Mode is a new objective type. Every unowned tile will be set to purchasable (Or purchasable construction rights for any unowned tile with a grounded path. Elevated paths will not be purchasable). To complete the objective, all tiles on the map must be purchased. Multiple Objectives can be enabled!
    # Add a small chance that this objective will be enabled.
    'false': 90
    'true': 10
  fireworks:
    # Have an explosive firework display on victory! Strongly discouraged if you intend to keep playing after victory or if you expect to have a huge park.
    # Unchanged from the base configuration.
    'false': 0
    'true': 50
  #########
  # Rules #
  #########
  difficult_guest_generation:
    # Makes guests harder to generate. Unlockable puts an item in generation that disables the rule when found.
    # Unchanged from the base configuration.
    'off': 0
    unlockable: 50
    'on': 0
  difficult_park_rating:
    # Makes park rating harder to improve. Unlockable puts an item in generation that disables the rule when found.
    # Disabled as I am no RollerCoaster Tycoon freak, just someone that enjoys the game.
    'off': 50
    unlockable: 0
    'on': 0
  forbid_high_construction:
    # Limits building to tree height. Unlockable puts an item in generation that disables the rule when found.
    # Being unable to construct anything beyond tree height is incredibly annoying, and even makes certain scenarios impossible.
    'off': 50
    unlockable: 0
    'on': 0
  forbid_landscape_changes:
    # Forbids the landscape from being altered. Unlockable puts an item in generation that disables the rule when found.
    # Unchanged from the base configuration.
    'off': 0
    unlockable: 50
    'on': 0
  forbid_marketing_campaigns:
    # Forbids marketing campaigns. Unlockable puts an item in generation that disables the rule when found.
    # Unchanged from the base configuration.
    'off': 0
    unlockable: 50
    'on': 0
  forbid_tree_removal:
    # Forbids removing trees. Unlockable puts an item in generation that disables the rule when found.
    # Unchanged from the base configuration.
    'off': 0
    unlockable: 50
    'on': 0
  ################
  # Shop Options #
  ################
  shop_minimum_excitement:
    # If the shop determines you need a ride with a minimum excitement, this value will be the lowest it can ask for.
    # If this value is higher than the maximum, the generator will assume it is a mistake and set it to 0.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 10.
    # Unchanged from the base configuration.
    0: 50
  shop_maximum_excitement:
    # If the shop determines you need a ride with a minimum excitement, this value will be the highest it can ask for.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 10.
    # Unchanged from the base configuration.
    10: 50
  shop_minimum_intensity:
    # If the shop determines you need a ride with a minimum intensity, this value will be the lowest it can ask for.
    # If this value is higher than the maximum, the generator will assume it is a mistake and set it to 0.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 7.
    # Unchanged from the base configuration.
    0: 50
  shop_maximum_intensity:
    # If the shop determines you need a ride with a minimum intensity, this value will be the highest it can ask for.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 7.
    # Unchanged from the base configuration.
    7: 50
  shop_minimum_nausea:
    # If the shop determines you need a ride with a minimum nausea, this value will be the lowest it can ask for.
    # If this value is higher than the maximum, the generator will assume it is a mistake and set it to 0.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 4.
    # Unchanged from the base configuration.
    0: 50
  shop_maximum_nausea:
    # If the shop determines you need a ride with a minimum nausea, this value will be the highest it can ask for.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 4.
    # Unchanged from the base configuration.
    4: 50
  shop_minimum_length:
    # If the shop determines you need a ride with a minimum length (In Meters), this value in meters will be the lowest it can ask for. If this value is higher than the maximum, the generator will assume it is a mistake and set it to 0.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 2500.
    # Unchanged from the base configuration.
    0: 50
  shop_maximum_length:
    # If the shop determines you need a ride with a minimum length (In Meters), this value will be the highest it can ask for.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 2500.
    # Unchanged from the base configuration.
    2500: 50
  shop_minimum_total_customers:
    # If the shop determines you need a ride with a minimum total number of customers, this value will be the lowest it can ask for. If this value is higher than the maximum, the generator will assume it is a mistake and set it to 0.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 1000.
    # Unchanged from the base configuration.
    0: 50
  shop_maximum_total_customers:
    # If the shop determines you need a ride with a minimum total number of customers, this value will be the highest it can ask for.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 1000.
    # Unchanged from the base configuration.
    1000: 50
  balance_guest_counts:
    # Attempts to balance the minimum guest requirements to the ride they're attached to. Low throughput rides like Spiral Slides will tend towards the minimum, while high throughput rides like roller coasters will tend towards the maximum.
    # Unchanged from the base configuration.
    'false': 0
    'true': 50
  visibility:
    # Choose how much the unlock shop displays.
    # "Nothing" tells you nothing about the item you'll purchase.
    # Progression tells you what class of item (Normal, Progression, Useful Trap) you're sending.
    # Recipient tells you who will receive the item, but not what they'll receive.
    # Progression Recipient tells you both the class of item and who receives it.
    # Full tells you what you're buying and who receives it.
    # I once changed this from Recipient to Nothing as no other games in my multiworlds have automatic hinting, however I've decided to give Recipient a try, because often I end up purchasing traps for games in progress.
    nothing: 0
    progression: 0
    recipient: 50
    progression_recipient: 0
    full: 0
  awards:
    # Choose what types (if any) of awards will have checks behind them.
    # Negative awards will always reward a trap item, even if they're otherwise disabled!
    # All Awards will have a check behind every award in the game.
    # Positive will only place a check behind awards with positive attributes.
    # None will not place checks behind awards.
    # When I play RCT2, I don't think about getting awards, so it is better to just remove those checks.
    all: 0
    positive: 0
    none: 50
  exclude_safest_park:
    # Exclude the Safest Park Award from having a check. This may be useful depending on deathlink settings.
    # In a multiworld, having this set to true is a must!
    'false': 0
    'true': 50
  #######################
  # Item & Trap Options #
  #######################
  filler:
    # How many extra filler items to add to the mix as a percentage. This will mostly consist of Cash Bonuses.
    # You can define additional values between the minimum and maximum values. Minimum value is 1, maximum value is 50.
    # Unchanged from the base configuration.
    random-range-1-50: 50
  include_atm:
    # Includes an ATM in the item list, regardless of whether it normally appears in the chosen scenario.
    # Unchanged from the base configuration.
    'false': 0
    'true': 50
  include_first_aid:
    # Includes a First Aid Room in the item list, regardless of whether it normally appears in the chosen scenario.
    # Unchanged from the base configuration.
    'false': 0
    'true': 50
  include_gamespeed_items:
    # If included, the ability to use the speed toggle will be restricted behind an item. 4 items total will be added, each progressively unlocking a faster speed.
    # Increased game speed should be available from the start.
    'false': 50
    'true': 0
  skips:
    # By default, every game starts with a single skip to ignore a shop requirement. This will add additional skips to be found in the item pool.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 100.
    random-range-0-10: 50
  furry_convention_traps:
    # When found, instantly hosts a furry convention in your park! Adding traps will increase the total number of items in the world.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 20.
    # Adjusted from 5 to equate to the standard trap count of 20. Requires firing all newly spawned Entertainers by solving a quiz, rather than excessive mouse clicking.
    random-range-0-16: 50
  bathroom_traps:
    # When found, instantly maxes out the bathroom stat of every guest! Adding traps will increase the total number of items in the world.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 20.
    # Adjusted from 5 to equate to the standard trap count of 20.
    random-range-0-10: 50
  spam_traps:
    # When found, spams ads all over the screen! Adding traps will increase the total number of items in the world.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 20.
    # Adjusted from 5 to equate to the standard trap count of 20.
    random-range-0-10: 50
  loan_shark_traps:
    # When found, increases your loan! Adding traps will increase the total number of items in the world.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 20.
    # Adjusted from 5 to equate to the standard trap count of 20. This specific trap has been reduced in quantity because of the strain it puts on the game.
    random-range-0-5: 50
  all_rides_and_scenery_base:
    # Adds every ride and scenery pack in the base game to the item pool. This will make for a significantly longer scenario.
    # Unchanged from the base configuration.
    'false': 50
    'true': 0
  all_rides_and_scenery_expansion:
    # Adds every ride and scenery pack in the RCT2 Expansion Packs to the item pool. If this is true the base game rides and scenery will also be included. This will make for a significantly longer scenario.
    # Unchanged from the base configuration.
    'false': 50
    'true': 0
  ###########################
  # Item & Location Options #
  ###########################
  # Unchanged from the base configuration.
  local_items: []
  non_local_items: []
  start_inventory: {}
  start_hints: []
  start_location_hints: []
  exclude_locations: []
  priority_locations: []
  item_links: []
  plando_items: []
