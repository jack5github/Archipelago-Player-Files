    none: 0
    low: 0
    medium: 50
    high: 50

  bee_trap_weight:
    # Likelihood of a receiving a trap that Spawns 6 angry bees near the player
    ## DoMess: v1.1: default changed from medium >>> low or medium
    none: 0
    low: 50
    medium: 50
    high: 0

  literature_trap_weight:
    # Likelihood of a receiving a trap that Opens Literature Pop-Ups
    ## DoMess: v1.1: default changed from medium >>> medium or high
    none: 0
    low: 0
    medium: 50
    high: 50

