    # Game owned by forbo.
    # - Rhythm Heaven Fever (WII + WIIU)
    # Game owned by Zeroman95. Implementation created by Jack5.
    - Sanctum (PC)
    # Game owned by Zeroman95 and forbo.
    - Stardew Valley (PC + PS4, PS5, SW, XONE, XSX, AND, IOS)
    # Game owned by Jack5 and forbo.
    - Super Hexagon (PC + AND, IOS)
    # Game owned by Zeroman95.
    - Super Smash Bros. for 3DS/Wii U (3DS + WIIU)
    # Game owned by Jack5. Implementation created by Jack5.
    - Tomodachi Life (3DS)
    # Game owned by Jack5 and forbo.
    - Tony Hawk's Pro Skater 1+2 (PC + PS4, PS5, SW, XONE, XSX)
    # Game owned by Jack5, Zeroman95 and forbo.
    - Tower Unite (PC)
    # Game owned by Jack5 and Zeroman95. Implementation created by Jack5.
    - Trivia Tricks (PC)
    # Game owned by Jack5 and Zeroman95.
    # - Vampire Survivors (PC + AND, IOS, PS4, PS5, SW, XONE, XSX) has been removed from this list, as all its objectives are time consuming despite not being classified as such. A new implementation is required to break up its objectives into smaller objectives.
    # Game owned by Jack5 and Zeroman95.
    - Worms Armageddon (PC + PS4, PS5, SW, XONE, XSX)
  game_selection_bag_size:
    # Determines the size of the bag from which the weighted games in 'game_selection' and 'game_medley_game_selection' will be randomly selected.
    # 0: No bag will be used and games may appear multiple times unbounded.
    # 1: The bag will be filled with 1 of each game and will be drawn from randomly until it is empty, resulting in an even distribution of games. If the bag becomes empty, it will be refilled.
    # 2+: The bag will initially be filled with the chosen number of each game, resulting in a slightly less even distribution of games where the maximum number of each game is the chosen number. Subsequent fills will revert to an even distribution. Similar logic applies for all other bag sizes.
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 5.
    # Unchanged from the base configuration.
    1: 50
  game_selection_force_select:
    # Forces certain games to become areas, selected and placed randomly from this list. This option does not affect shops or the Keymaster's challenge room. If more games than permitted areas are specified, this option will cause an error. 'game_selection_bag_size' will treat games added by this option as if they have been pre-drawn from their respective bags.
    # You are allowed to add the same game multiple times here. This will cause that many instances of the game to appear as areas.
    # 1 of all meta games have been added to this list to ensure they appear at least once.
    - 'Consumables (META)'
    - 'Custom (META)'
  ######################
  # Consumables (META) #
  ######################
  # consumables_min_rarity:
  # The minimum rarity required for consumables to appear. Increasing this will raise the overall power of consumables.
  # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 6.
  # As this is unchanged from the base configuration, it is omitted in case the values change.
  # consumables_max_rarity:
  # The maximum rarity allowed for consumables to appear. Reducing this will lower the overall power of consumables.
  # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 6.
  # As this is unchanged from the base configuration, it is omitted in case the values change.
  consumables_banned_types:
    # The list of consumable types banned from appearing. A consumable's types can be found in the `consumables()` method of the source code. "on_hint" and "on_shop" are banned by default, "on_hint" in order to get players used to the concept of consumables, and "on_shop" as it is uncommon for players of Keymaster's Keep to have shops enabled. To allow these conditional consumables to appear, set this to an empty list.
    # "on_hint" has been removed from the list to allow its consumables to appear.
    [ 'on_shop' ]
  # consumables_custom:
  # A dictionary of custom content to add to the implementation. Currently accepts a list of consumables under the key `consumables`, which obey the `consumables_min_rarity`, `consumables_max_rarity` and `consumables_banned_types` options, each of which is expected to have the following keys:
  #     - `name` (str) - The name of the consumable.
  #     - `description` (str) - The description of the consumable.
  #     - `rarity` (str | int, optional) - The rarity of the consumable, as it is represented in the `ConsumableRarity` enum. Defaults to 0.
  #     - `types` (list[str], optional): The types of the consumable, used in filtering. Defaults to [].
  #     - `creators` (str | list[str], optional) - The people that came up with the idea for the consumable. Defaults to "Custom".
  # As this is unchanged from the base configuration, it is omitted in case the way the option's values are stored changes.
  consumables_show_names:
    # Whether to show consumable names at the start of their descriptions.
    # Unchanged from the base configuration.
    'false': 0
    'true': 50
  consumables_show_rarities:
    # Whether to show consumable rarities at the end of their descriptions.
    # Unchanged from the base configuration.
    'false': 0
    'true': 50
  consumables_show_creators:
    # Whether to show consumable creators at the end of their descriptions.
    # Unchanged from the base configuration.
    'false': 50
    'true': 0
  #################
  # Custom (META) #
  #################
  custom_objective_list:
    # A freeform list of custom objectives for Keymaster's Keep. The trials will sample directly from this list.
    # We are using the Custom (META) objectives as a means of capturing a wide range of objectives related to us playing games in our Discord voice calls.
    - 2 or more people are Hungry Jacks'd at the same time (if possible)
    - An Archipelago player's game is released
    - Buy something from the Discord Shop Orbs Exclusives
    - Catch a shiny Pokémon
    - Change Discord server tag
    - coatofarmor is the straight man of the group
    - coatofarmor leaves as soon as a game is over
    - Complete a game after this is revealed
    - Complete a game earlier than expected
    - Complete a game without using its PopTracker
    - Complete an annoying setup process
    - Complete something taxing and get barely anything in return
    - DoMess uses his microphone
    - DoMess' soundboard is perfectly timed
    - Don't play a game for an entire voice call
    - Drink water
    - Earn any RetroAchievement
    - Everyone immediately points out the song now playing
    - Find a new Keymaster's Keep codex entry to try
    - Finish a round of the Wiki Speedrun Game
    - Five Night's at Freddy's reference
    - Game connection issues
    - Game crash
    - Get a message in the supporter channels
    - Go outside and touch grass
    - Glitch and Major Hawk10 argue
    - Glitch can't think of a good defense
