  ###################################
  dominion_weights:
    # The weights to use for Dominion objective types. Note that "win_with_card" and half of "win_against_ai" are classified as difficult, and will not appear if difficult objectives are disabled. Defaults to only objectives that can be completed in real life. If playing the 2021 version of Dominion by Temple Gates Games, it is recommended to start with the following weights:
    # ```yaml
    # setup_with_cards: 1
    # play_card: 8
    # win_with_card: 1
    # win_against_ai: 1
    # bonus: 2
    # ```
    # Since we are playing the video game, we've changed the weights to include video game objectives.
    bonus: 2
    play_card: 8
    setup_with_cards: 1
    win_against_ai: 1
    win_with_card: 1
  dominion_expansion_weights:
    # The weights to use for expansions in Dominion objectives. Expansions are based on the 2021 version of Dominion by Temple Gates Games, where "...1st Edition" expansions only contain cards exclusive to them. Weights are proportional to the number of cards in their respective expansions. Defaults to only including the base game.
    # These weights have been changed to include all of the DLC that Jack5 owns, which can be played by everyone.
    Adventures: 0
    Alchemy: 0
    Allies: 0
    Base: 1
    Base 1st Edition: 0
    Black Market: 1
    Cornucopia: 1
    Cornucopia 1st Edition: 1
    Dark Ages: 0
    Empires: 1
    Guilds: 0
    Guilds 1st Edition: 0
