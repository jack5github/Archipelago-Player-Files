name: Jack5Portal2{NUMBER}
description: |-
  Jack5's Portal 2 player file

  This Portal 2 configuration adjusts the potential randomisation of the game to be more suitable for playing it in conjunction with other games. Traps are enabled, and the accessible maps are restricted to ensure more levels get played, removing those where nothing happens.
game: Portal 2
requires:
  version: 0.6.6
  game:
    Portal 2: 0.4.0
Portal 2:
  ################
  # Game Options #
  ################
  progression_balancing:
    # Unchanged from the base configuration.
    normal: 50
  accessibility:
    # Unchanged from the base configuration.
    full: 50
  death_link:
    # When you die, everyone who enabled death link dies. Of course, the reverse is true too.
    # "No need to be selfish, luv, you're gonna die." - Wheatley
    'false': 0
    'true': 50
  ####################
  # Location Options #
  ####################
  game_mode:
    # What map generation and logic options are set:
    # normal -> Each chapter is randomised with it's own maps
    # chaotic -> Any map can be in any chapter
    # open_world -> maps appear in the correct order in the game and are all playable from the start
    # Make all non-open world game modes equally likely to occur. Open world allows me to access the final map immediately, which could result in the game ending too quickly.
    normal: 50
    chaotic: 50
    open_world: 0
  early_playability_percentage:
    # What percentage of starting maps are in the first round of map selection
    # Minimum of 60 -> Over half of the starting maps are available from the get go, slightly slower start
    # Maximum of 100 -> All starting maps are available from the get go, a very quick start
    # You can define additional values between the minimum and maximum values. Minimum value is 60, maximum value is 100.
    # Portal 2 becomes boring the more Chapter 1 levels are made available at the start of the game, so I have set this option to its absolute minimum.
    60: 50
  remove_locations:
    # Which maps will be removed entirly from the map pool.
    # Different from Excluded Locations as Removed Locations will not be playable during the game. Excluded Locations are still in the map pool.
    # These are maps that I would rather not play, mainly those that scarcely make use of the Portal Gun and require lots of walking.
    - 'Chapter 1: Container Ride Completion'
    - 'Chapter 1: Secret Panel Completion'
    - 'Chapter 1: Wake Up Completion'
    - 'Chapter 5: Neurotoxin Sabotage Completion'
    - 'Chapter 5: Turret Factory Completion'
    - 'Chapter 5: Turret Sabotage Completion'
    - 'Chapter 6: Cave Johnson Completion'
    - 'Chapter 9: Finale 1 Completion'
  cutscene_levels:
    # Determines whether cutscene maps are added to the map pool
    # I do not want to have to watch cutscenes to progress.
    'false': 50
    'true': 0
  wheatley_monitors:
    # Determines whether breaking Wheatly monitors will send location checks
    # This option is a must in order to increase the number of locations.
    'false': 0
    'true': 50
  ratman_dens:
    # Determines whether locating Ratman Dens will send location checks
    # This option is a must in order to increase the number of locations.
    'false': 0
    'true': 50
  ################
  # Trap Options #
  ################
  trap_fill_percentage:
    # Replace a percentage of junk items in the item pool with random traps
    # You can define additional values between the minimum and maximum values. Minimum value is 0, maximum value is 100.
    # The default is to have no traps at all, increased to 20%, a number used in many of my other configs.
    20: 50
  motion_blur_trap_weight:
    # Likelihood of receiving a trap which makes it a little hard to see
    # Unchanged from the base configuration.
    none: 0
    low: 0
    medium: 50
    high: 0
  fizzle_portal_trap_weight:
    # Likelihood of receiving a trap which fizzles ALL portals on the map
    # Unchanged from the base configuration.
    none: 0
    low: 0
    medium: 50
    high: 0
  butter_fingers_trap_weight:
    # Likelihood of receiving a trap which makes it a little hard to hold items
    # Unchanged from the base configuration.
    none: 0
    low: 0
    medium: 50
    high: 0
  cube_confetti_trap_weight:
    # Likelihood of receiving a trap which makes an explosion of colorful cubes at your feet
    # Unchanged from the base configuration.
    none: 0
    low: 0
    medium: 50
    high: 0
  slippery_floor_trap_weight:
    # Likelihood of receiving a trap which makes Chell slip and slide
    # Unchanged from the base configuration.
    none: 0
    low: 0
    medium: 50
    high: 0
  ###########################
  # Item & Location Options #
  ###########################
  local_items: []
  non_local_items: []
  start_inventory:
    # Lasers and Laser Relays are already items that can be unlocked during a run. It doesn't make sense for catchers to be an item too, as this makes it take much longer to be able to use lasers in general. This change is temporarily disabled due to a bug in config generation.
    # Laser Catchers: 1
    {}
  start_hints: []
  start_location_hints: []
  exclude_locations:
    # Do not consider the final map to be an important location. It causing all Portal 2-held items to be released is enough of a reward.
    - 'Chapter 9: Finale 4 Completion'
  priority_locations:
    # Ensure this chamber is expected to be played, as it is a map that requires a lot of items to progress, ensuring a more complete playthrough of Portal 2.
    - 'Chapter 8: Laser Catapult Completion'
  item_links: []
  plando_items: []
