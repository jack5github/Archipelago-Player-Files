name: ZeromanTABS{NUMBER}
description: Zeroman95's TAB Yaml
game: Totally Accurate Battle Simulator
requires:
  version: 0.6.6
  game:
    Totally Accurate Battle Simulator: 0.1.0
Totally Accurate Battle Simulator:
  progression_balancing: # Changed back to 50 because I have messed with Progression for too long.
    50: 99

  accessibility:
    full: 50
    minimal: 0
  factions: # Tribal, Wild West, Fantasy Good, Legacy, Secret, Medieval, Ancient, Dynasty, Renaissance, Pirate, Viking, Fantasy Evil, Spooky, Farmer. Pick ONE Faction to play with; Secret faction stays unlocked.
    - Tribal
    - Wild West
    - Fantasy Good
    - Legacy
    - Medieval
    - Ancient
    - Dynasty
    - Renaissance
    - Pirate
    - Viking
    - Fantasy Evil
    - Spooky
    - Farmer
    - Secret
  progressive_factions:
    'false': 50
    'true': 0
  secret_type:
    none: 0
    regular: 0
    no_unlocks: 0
    all: 50
  required_campaigns: ['Introduction', 'Wild West', 'Spooky', 'Simulation'] # Introduction, Adventure, Challenge, Dynasty, Renaissance, Pirate, Spooky, Simulation, Wild West, Legacy, Fantasy Good, Fantasy Evil. Roll Four Campaigns with a Random Number Generator.
  additional_campaigns: []
  hidden_campaign_unlocks:
    'false': 0
    'true': 50
  local_items: []
  non_local_items: []
  start_inventory: {}
  start_inventory_from_pool: { 'Halfling': 1 } # Start with the 1st unit of Faction rolled from a Wheel or random number.
  start_hints: []
  start_location_hints: []
  exclude_locations: []
  priority_locations: []
  item_links: []
  plando_items:
    # Present Elf is placed at end of Whatever final Campaign because Present Elf as a unit makes the game too easy.
    - locations:
        - Pit (Simulation-17)
      items:
        Present Elf: true
      force: false
