name: ZeromanSC2{NUMBER}

description: Zeroman95s Starcraft 2 YAML

game: Starcraft 2
requires:
  version: 0.6.7
  game:
    Starcraft 2: 4.0.0

Starcraft 2:
  progression_balancing: # Unchanged
    50: 99

  accessibility: # Unchanged
    full: 50
    minimal: 0

  start_inventory: {}

  disable_forced_camera: # Changed to false because I always play with forced camera.
    'false': 50
    'true': 0

  skip_cutscenes: # Unchanged
    'false': 50
    'true': 0

  game_difficulty: # Who doesn't love a good challenge?
    hard: 99

  game_speed: # The game is normally at faster speed when in Skirmish or any mode ever.
    faster: 99

  starter_unit: # Unchanged
    'off': 99

  required_tactics: # By setting it to advanced I need to be clever to progress.
    advanced: 99

  war_council_nerfs: # Makes all Protoss units from Legacy of The Void require their upgrades as seperate items in the pool.
    'false': 0
    'true': 50

  difficulty_curve: # Uneven makes it so sure I get a easy mission at first but then easy missions can be anywhere else.
    standard: 0
    uneven: 50

  mission_order: # Missions on a Grid is an incredible way to do it.
    grid: 99

  maximum_campaign_size: # 18 Missions that way it is a 4x4 grid.
    18: 99

  enabled_campaigns: # The first three Campaigns are picked to put into the Grid.
    ['Wings of Liberty', 'Prophecy', 'Heart of the Swarm', 'Legacy of the Void']

  enable_race_swap: # Unchanged
    disabled: 50
    pick_one: 0
    pick_one_non_vanilla: 0
    shuffle_all: 0
    shuffle_all_non_vanilla: 0

  shuffle_no_build: # Make all Missions including No Build Missions to be random.
    'false': 50
    'true': 0

  key_mode: # Unchanged
    disabled: 50
    questlines: 0
    missions: 0
    progressive_questlines: 0
    progressive_missions: 0
    progressive_per_questline: 0

  shuffle_campaigns: # Doesn't do anything unless Vanilla Shuffled or Mini Campaign Mission Order is picked.
    'false': 0
    'true': 50

  all_in_map: # This only works if this final mission is picked. This is the Mission from WOL.
    ground: 33
    air: 33
    random: 33

  two_start_positions: # Unchanged
    'false': 50
    'true': 0

  selected_races:
    # Pick which factions' missions and items can be shuffled into the world.
    ['Zerg', 'Protoss', 'Terran']

  exclude_very_hard_missions: # Unchanged
    default: 50
    'true': 0
    'false': 0

  mission_race_balancing: # Disabled to make one of the races the most unique and special to the run.
    disabled: 99
    semi_balanced: 0
    fully_balanced: 0

  ensure_generic_items: # Make Generic Items completely random.
    random-range-0-100: 99

  min_number_of_upgrades: # MAX UPGRADES PLEASE.
    13: 99

  max_number_of_upgrades: # -1 means Infinite upgrades.
    -1: 99

  max_upgrade_level: # Mor upgrad.
    5: 99

  generic_upgrade_missions: # Unchanged
    0: 99

  generic_upgrade_research: # Sets it so when I get weapon armor or unique upgrades for a unit that I don't require to research them to make them work in the Mission.
    always_auto: 99

  generic_upgrade_research_speedup: # Unchanged
    'false': 50
    'true': 0

  generic_upgrade_items: # Unchanged
    individual_items: 99

  kerrigan_presence: # Unchanged
