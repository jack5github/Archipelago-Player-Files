name: ZeromanLM{NUMBER}

description: 'Zeroman95s Luigis Mansion YAML'

game: Luigi's Mansion
requires:
  version: 0.6.7
  game:
    Luigi's Mansion: 0.6.0

Luigi's Mansion: # Set to 60 now because 25 is not enough and I get stuck immediately.
  progression_balancing:
    60: 99

  accessibility: # I want the whole Mansion.
    full: 99

  # SANITY CHECK LIST
  # Nothing - If no Sanity is turned on the whole default run is 82 Checks.
  # Hangables - Adds 67 Checks
  # Decor - Adds 165 Checks
  # Ceiling - Adds 50 Checks
  # Candles - Adds 28 Checks
  # Seating - Adds 54 Checks
  # Surfaces - Adds 30 checks
  # Storage - Adds 81 Checks
  # Plants - Adds 26 Checks
  # Drawers - Adds 38 Checks
  # Treasures - Adds 126 Checks
  # Basement - Adds 52 Checks
  # Full - Adds 538 Checks

  furnisanity: # Turning Treasures on means all Furniture that have Treasure in them will now have checks in them.
    ['Treasures']

  toadsanity: # Enabled to have many Toads around the Mansion.
    'false': 0
    'true': 50

  gold_mice: # Unchanged
    'false': 50
    'true': 0

  boosanity: # Instead of capturing a Boo normally now it is just a location with a random item.
    'false': 0
    'true': 50

  portrification: # All Portrait Ghosts are checks.
    'false': 0
    'true': 50

  silver_ghosts: # Unchanged
    'false': 50
    'true': 0

  gold_ghosts: # Unchanged
    'false': 50
    'true': 0

  speedy_spirits: # Unchanged
    'false': 50
    'true': 0

  lightsanity: # Unchanged
    'false': 50
    'true': 0

  walksanity: # Unchanged
    'false': 50
    'true': 0

  grassanity: # Unchanged
    'false': 50
    'true': 0

  WDYM_checks: # Unchanged
    'false': 50
    'true': 0

  rank_requirement: # Ranks in this game do matter; Even then it doesn't do much to render the game unplayable considering the AMOUNT of Gems and Diamonds you can find in the game. rank_h is lower because rank_h means you don't need any money making it worthless.
    rank_h: 5
    rank_g: 13
    rank_f: 13
    rank_e: 13
    rank_d: 13
    rank_c: 13
    rank_b: 13
    rank_a: 13

  game_mode: # Unchanged
    default: 99

  vacuum_start: # Don't start with it, only search until I find it.
    'false': 50
    'true': 0

  mario_items: # Unchanged
    5: 99

  boo_gates: # Unchanged
    'false': 0
    'true': 50

  balcony_boo_count: # Set to 0 to 25. Makes it so sometimes Boolossus can be opened early or late.
    random-range-0-25: 99

  final_boo_count: # 30 to 50 Boo's is good enough. Makes the game last a good lot longer.
    random-range-30-50: 99

  enemizer: # This randomizes ghost waves for each room that needs to be captured, randomized_elements means ghosts with elements will be randomized too.
    randomized_elements: 99

  door_rando: # Set all_doors_locked to be enabled; This means every time I get a Key I can get new checks.
    all_doors_locked: 99

  random_spawn: # This is the BEST Feature this AP has to offer. This is staying set to True.
    'false': 0
    'true': 50

  early_first_key: # This is being turned on now due to a run with Jack just being stuck in the first room HJ'd.
    'false': 0
    'true': 50

  walk_speed: # Unchanged
    normal_speed: 99

  luigi_max_health: # As long as I have around or over 75 Health this makes LM more of a Challenge.
    random-range-75-150: 99

  enable_fear_animation: # Unchanged
    'false': 0
    'true': 50

  enable_pickup_animation: # Unchanged
    'false': 0
    'true': 50

  self_item_messages: # Originally set on Nothing because of having a client on the side, might be nice to see the messages while the Universal Tracker is switched on in the Client.
    all_messages: 99

  death_link: # Bring it, I always turn on Deathlink whenever I am playing.
    'false': 0
    'true': 50

  trap_link: # Set to True, bring the pain.
    'false': 0
    'true': 50

  enable_trap_client_msg: # Unchanged
    'false': 0
    'true': 50

  energy_link: # Unchanged (No idea how to use this)
    'false': 0
    'true': 50

  ring_link: # Changed to false because energy and ring links cannot be enabled AT THE SAME TIME.
    'false': 50
    'true': 0

  enable_ring_client_msg: # Unchanged
    'false': 0
    'true': 50

  vacuum_upgrades: # Let the game decide whether it wants fast combat or slow combat.
    random-range-0-5: 99 # random value between 0 and 5

  boo_radar: # Unchanged
    include: 99

  hidden_mansion: # Unchanged
    'false': 50
    'true': 0

  hint_distribution: # Pick very IMPORTANT items.
    strong: 99

  portrait_hints: # This is cool, I will scan a lot more often if this is set to true.
    'false': 0
    'true': 50

  send_hints: # Unchanged
    'false': 0
    'true': 50

  king_boo_health: # Pick a random amount of health between 500 and 1000.
    random-range-500-1000: 99

  boolossus_difficulty: # Unchanged
    easy: 0
    normal: 99
    hard: 0

  boo_health_option: # Same as Portrait ghosts, increase health the higher the Sphere is.
    boo_health_by_sphere: 99

  boo_health_value: # Same as Portrait ghosts, completely random.
    random-range-199-300: 99

  boo_speed: # boo_speed only really effects how fast they can escape; So pick random.
    random-range-1-36: 99 # random value between 1 and 36

  boo_escape_time: # allow the Boo's to have a random amount of time to leave the room.
    random-range-120-300: 99

  boo_anger: # Unchanged (Not sure why but I can still get hurt anyways)
    'false': 50
    'true': 0

  extra_boo_spots: # Add extra spots because why not?
    'false': 0
    'true': 50

  portrait_health_option: # Portrait_health_by_sphere picks a certain amount of health depending on what Sphere it is in, higher it is the more health.
    portrait_health_by_sphere: 99

  portrait_health_value: # Portrait ghosts have more health now making them an actual challenge.
    random-range-199-300: 99

  random_music: # Unchanged
    'false': 50
    'true': 0

  door_model_rando: # Unchanged
    'false': 50
    'true': 0

  chest_types: # Set to full_random to make chests be different every time.
    vanilla: 0
    default: 0
    full_random: 99
    color: 0
    size_and_color: 0
    no_fuzzy_matching: 0

  trap_chests: # Trap chests can contain anything. Not 100% Sure what this does though.
    filler: 0
    progression: 0
    anything: 99

  spookiness: # Unchanged
    vanilla: 99
    full_spooky: 0
    random_rooms: 0

  call_mario: # Scream out MARIO!
    'false': 0
    'true': 50

  filler_weights: # Unchanged
    Bars: 11
    Bills: 11
    Bundles: 11
    Coins: 16
    Dust: 34
    Gems: 6
    Hearts: 11

  trap_percentage: # Changed to random-low to allow small amount of traps.
    25: 99

  trap_weights: # Unchanged
    Banana Trap: 15
    Bomb: 15
    Bonk Trap: 15
    Fear Trap: 25
    Ghost: 15
    Ice Trap: 15
    No Vac Trap: 5
    Poison Mushroom: 15
    Possession Trap: 5
    Spooky Time: 25
    Squash Trap: 15

  local_items: []

  non_local_items: []

  start_inventory: {}

  start_inventory_from_pool: {}

  start_hints: []

  start_location_hints: []

  exclude_locations:
    [
      'Secret Altar C Chandelier',
      'Secret Altar R Chandelier',
      'Secret Altar L Chandelier',
      'Secret Altar Brazier (near front, closest to 4th Wall)',
      'Secret Altar Brazier (near front, away from 4th Wall)',
      'Secret Altar L Candles',
      'Secret Altar R Candles',
    ]

  priority_locations: []

  item_links: []

  plando_items: []
