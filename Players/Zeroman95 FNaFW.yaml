name: ZeromanFNAFW{NUMBER}

description: |-
  Zeroman95's FNAF WORLD Yaml.

game: FNaFW
requires:
  version: 0.6.6

FNaFW:
  progression_balancing:
    0: 99 # Changed to 0 for Disabled.

  accessibility:
    full: 99 # Unchanged

  ending_goal:
    scott: 99 # Unchanged

  initial_characters:
    limited_random: 99 # Start with simple characters on the first three rows.

  vanilla_halloween:
    # Unchanged
    'false': 0
    'true': 50

  vanilla_lasers:
    # Unchanged
    'false': 50
    'true': 0

  vanilla_pearl:
    # Unchanged
    'false': 50
    'true': 0

  hard_logic:
    # Unchanged
    'false': 50
    'true': 0

  cheap_endo:
    # I want to grind, also for the fact that the Items give you Tokens anyway.
    'false': 50
    'true': 0

  require_find_char:
    # set to false because it messes with the Poptracker; Because for SOME reason I can still get characters without the Character Chip. So false.
    'false': 50
    'true': 0

  progressive_anims:
    # Changed to True, if set to false makes game super easy.
    'false': 0
    'true': 50

  progressive_bytes:
    # Changed to True, if set to false makes game super easy.
    'false': 0
    'true': 50

  progressive_chips:
    # Changed to True, if set to false makes game super easy.
    'false': 0
    'true': 50

  area_warping:
    visit_area: 0 # Setting it to always will make me require an item for each area to warp.
    always: 99
    warp_item: 0

  fazcoin_chests:
    3: 99 # Fazcoin chests should be set to three so that there are always three unique checks in each area.

  local_items: []

  non_local_items: []

  start_inventory: {}

  start_hints: []

  start_location_hints: []

  exclude_locations: # Added because those locations only have ONE Chest spot meaning you need to keep resetting the game just for them to spawn. I have Fazchest checks set to Three meaning I would have to do this THREE different times.
    [
      'Deep-Metal Mine: Fazcoin Chest 1',
      'Deep-Metal Mine: Fazcoin Chest 2',
      'Deep-Metal Mine: Fazcoin Chest 3',
      'Pinwheel Circus: Fazcoin Chest 1',
      'Pinwheel Circus: Fazcoin Chest 2',
      'Pinwheel Circus: Fazcoin Chest 3',
      'Pinwheel Funhouse: Fazcoin Chest 1',
      'Pinwheel Funhouse: Fazcoin Chest 2',
      'Pinwheel Funhouse: Fazcoin Chest 3',
    ]

  priority_locations: []

  item_links: []

  plando_items: []
