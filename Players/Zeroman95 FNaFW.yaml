name: ZeromanFNaFW{NUMBER}

description: |-
  Zeroman95's FNaF WORLD Yaml.

game: FNaFW
requires:
  version: 0.6.6

FNaFW:
  progression_balancing:
    85: 99 # Super increasing this to 85 because FNaFW NEVER gets played at all within 25.

  accessibility:
    full: 99 # Unchanged

  ending_goal: # Added other goals, making each game a unique run.
    scott: 10
    clock: 10
    fourth_glitch: 10
    universe_end: 10
    chipper: 10

  initial_characters:
    true_random: 99 # Picks ANY Character in the list.

  vanilla_halloween:
    # CHANGED to allow the Animatronic Progression to be elsewhere. Plus all Halloween related checks are now excluded.
    'false': 50
    'true': 0

  vanilla_lasers:
    # Unchanged
    'false': 50
    'true': 0

  vanilla_pearl:
    # Unchanged
    'false': 50
    'true': 0

  hard_logic:
    # Unchanged
    'false': 50
    'true': 0

  cheap_endo:
    # I want to grind, also for the fact that the Items found give you Tokens anyway.
    'false': 50
    'true': 0

  require_find_char:
    # set to false because it messes with the Poptracker; Because for SOME reason I can still get characters without the Character Chip. So false.
    'false': 50
    'true': 0

  progressive_anims:
    # Changed to True, if set to false makes game super easy.
    'false': 0
    'true': 50

  progressive_bytes:
    # Changed to False because it makes the game more challenging.
    'false': 50
    'true': 0

  progressive_chips:
    # Changed to False because it makes the game more challenging.
    'false': 50
    'true': 0

  area_warping:
    visit_area: 0 # Setting it to always will make me require an item for each area to warp.
    always: 99
    warp_item: 0

  fazcoin_chests:
    3: 99 # Fazcoin chests should be set to three so that there are always three unique checks in each area.

  local_items: []

  non_local_items: []

  start_inventory: {}

  start_hints: []

  start_location_hints: []

  exclude_locations: # The Halloween Character locations are now excluded.
    [
      'Jack-O-Bonnie',
      'Jack-O-Chica',
      'Animdude',
      'Mr. Chipper',
      'Nightmare BB',
      'Nightmarionne',
      'Coffee',
      'Purpleguy',
    ]

  priority_locations: ['Fazbear Hills: Pearl']

  item_links: []

  plando_items: []
