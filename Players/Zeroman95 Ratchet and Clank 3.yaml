name: ZeromanRAC3{NUMBER}

description: Zeroman95 Ratchet and Clank 3 YAML

game: Ratchet and Clank 3
requires:
  version: 0.6.7
  game:
    Ratchet and Clank 3: 0.5.3

Ratchet and Clank 3:
  progression_balancing:
    # I play with RANDOM Location so no Progression please!
    0: 99

  accessibility:
    # Set to minimal to make Items required to beat the game be available only.
    full: 0
    minimal: 50

  deathlink:
    # Death will affect everyone.
    'false': 0
    'true': 50

  intro_skip:
    # Intro Skip can now be used with the PAL Version of the game. Absolutely please pass Veldin.
    disabled: 0
    enabled: 50

  holostar_skip:
    # Unchanged
    start_as_clank: 50
    start_at_trailer: 0

  bolt_and_xp_multiplier:
    # Set this to x1 for now, not sure if I will increase this or not. If so increase it to x2 because NewGame+ stuff is in this AP.
    x1: 99

  one_hp_challenge:
    # Unchanged
    Clank: 0
    Giant Clank: 0
    Qwark: 0
    Ratchet: 0
    Vehicle: 0

  starting_weapons:
    # RY3NO is off because RY3NO is overpowered.
    Agents of Doom: 1
    Annihilator: 1
    Bouncer: 1
    Disc Blade Gun: 1
    Flux Rifle: 1
    Holo Shield Glove: 1
    Infector: 1
    Lava Gun: 1
    Miniturret Glove: 1
    N60 Storm: 1
    Nitro Launcher: 1
    Plasma Coil: 1
    Plasma Whip: 1
    Qwack-O-Ray: 1
    RY3N0: 0
    Rift Inducer: 1
    Shield Charger: 1
    Shock Blaster: 1
    Spitting Hydra: 1
    Suck Cannon: 1

  progressive_weapons:
    # Unchanged
    disable: 50
    enable: 0

  armor_upgrade:
    # Unchanged
    4: 99
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-8: 0 # random value between 0 and 8

  clank_options:
    # Set to put Heli-Pack and Thruster-Pack somewhere in the Pool. Meaning I won't have clank for a good portion of the game until then.
    shuffled_independently: 99

  traps_enabled:
    # I play this game with a passion bring on the Traps.
    disabled: 0
    enabled: 50

  trap_weight:
    # Unchanged
    1-Hit KO Trap: 1
    Black Screen Trap: 1
    Invisible Trap: 1
    Item Lock Trap: 1
    No Ammo Trap: 1
    No Clank Trap: 1
    Wrench Only Trap: 1

  filler_weight:
    # Bolts and Jackpot are finally useful. Turning those up and turning Player EXP down.
    Bolts: 10
    Jackpot: 10
    Nanotech EXP: 5
    Weapon Level-Up: 0 # (5) UNUSED DISABLED PROGRESSIVE WEAPONS

  weapon_vendors:
    # Unchanged
    disabled: 0
    enabled: 50

  armor_vendor:
    # Unchanged
    disabled: 0
    enabled: 50

  ship_vendor:
    # Unchanged
    disabled: 0
    enabled: 50

  scout_vendors:
    # Feels good to share these Items as hints to other players so they know something is here.
    Armor: 1
    Ship: 1
    Weapon: 1

  skill_points:
    # I play with all Skill Points on, I 100%'d this game so many times I have memorised EVERY Skill Point on the game.
    all: 99

  trophies:
    # I have played this game so many times I know where every Trophy is and how to obtain them.
    all: 99

  titanium_bolts:
    # Unchanged
    disabled: 0
    enabled: 50

  rangers:
    # Unchanged
    none: 0
    story_missions: 0
    optional_missions: 0
    all: 50

  vidcomics:
    # Unchanged
    disabled: 0
    enabled: 50

  vr_challenges:
    # Unchanged
    disabled: 0
    enabled: 50

  arena:
    # Unchanged
    none: 0
    first_only: 0
    second_only: 0
    all: 50

  sewer_crystals:
    # All Sewer Crystals because now the Bolts in them are worth it.
    all: 99

  sewer_limitation:
    # All Sewer Crystals are now checks.
    101: 99

  nanotech_milestones:
    # All Nanotech milestones give checks.
    all: 99

  nanotech_limitation:
    # Unchanged
    100: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-11-100: 0 # random value between 11 and 100

  ship_nose:
    # Random Ship Nose.
    standard: 33
    split: 33
    scoop: 33

  ship_wings:
    # Random Ship Wings.
    standard: 33
    hi_lift: 33
    heavy_ordinance: 33

  ship_skin:
    # Allow random ship skin other then blargian red.
    blargian_red: 0
    orxon_green: 3
    bogon_blue: 3
    insomniac_special: 3
    dark_nebula: 3
    dreks_black_heart: 3
    space_storm: 3
    lunar_eclipse: 3
    plaidtastic: 3
    supernova: 3
    solar_wind: 3
    clowner: 3
    silent_strike: 3
    lombax_orange: 3
    neutron_star: 3
    star_traveller: 3
    hooked_on_onyx: 3
    tyhrranoid_void: 3
    zeldren_sunset: 3
    ghost_pirate_purple: 3
    qwark_green: 3
    agent_orange: 3
    helgas_hues: 3
    ameboid_green: 3
    pulsing_purple: 3
    obani_orange: 3
    low_rider: 3
    black_hole: 3
    sun_storm: 3
    sasha_scarlet: 3
    florana_breeze: 3
    ozzy_kamikaze: 3

  player_skin:
    # Allow to pick random skin other then default Ratchet.
    default: 0
    old_school: 12
    snowman: 12
    tuxedo: 12
    buginoid: 12
    brainius: 12
    unused_robot: 12
    robo_rooster: 12
    trooper: 12
    robo: 12

  exclude_locations: [ 'Unstable' ]

  local_items: []

  non_local_items: []

  start_inventory: {}

  start_inventory_from_pool: {}

  start_hints: []

  start_location_hints: []

  priority_locations: []

  item_links: []

  plando_items:
    # Generic items plando.
    # places the RY3NO right at the end of the game making it unusable and banned.
    - locations:
        - 'Command Center: Dr. Nefarious Defeated!'
        - 'Command Center: Biobliterator Defeated!'
      items:
        RY3N0: true
      force: false
