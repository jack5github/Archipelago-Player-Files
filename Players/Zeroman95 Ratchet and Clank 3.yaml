name: ZeromanRAC3{NUMBER}
description: |-
  Zeroman95's Ratchet and Clank 3 Player file

game: Ratchet and Clank 3
requires:
  version: 0.6.6
Ratchet and Clank 3:
  progression_balancing: # GIVE IT TO ME. I LOVE THIS GAME WITH A PASSION THAT I BREAK IT ALL THE TIME.
    0: 99

  accessibility: # Set to minimal to limit planet locations and checks. Makes the game more challenging.
    full: 0
    minimal: 50

  deathlink: # Kill me!
    'off': 0
    'on': 50

  intro_skip: # Intro Skip is disabled so that I can use my PAL Copy of the game.
    disabled: 50
    enabled: 0

  holostar_skip: # Unchanged
    start_as_clank: 50
    start_at_trailer: 0

  bolt_and_xp_multiplier: # X1 is picked because buying Items is considered Junk Checks. Higher multiplier means more bolts and experience (Experience not included yet!)
    x1: 99
    x2: 0
    x4: 0
    x8: 0
    x16: 0

  one_hp_challenge: # Unchanged
    Clank: 0
    Giant Clank: 0
    Qwark: 0
    Ratchet: 0
    Vehicle: 0

  starting_weapons: # All weapons are switched on except for RY3NO.
    Agents of Doom: 1
    Annihilator: 1
    Bouncer: 1
    Disc Blade Gun: 1
    Flux Rifle: 1
    Holo Shield Glove: 1
    Infector: 1
    Lava Gun: 1
    Miniturret Glove: 1
    N60 Storm: 1
    Nitro Launcher: 1
    Plasma Coil: 1
    Plasma Whip: 1
    Qwack-O-Ray: 1
    RY3N0: 0
    Rift Inducer: 1
    Shield Charger: 1
    Shock Blaster: 1
    Spitting Hydra: 1
    Suck Cannon: 1

  enable_progressive_weapons: # Disabled because why.
    disable: 50
    enable: 0

  armor_upgrade: # Unchanged
    4: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-8: 0 # random value between 0 and 8

  clank_options: # Don't start with Clank and shuffle his Packs independently.
    shuffled_independently: 99

  traps_enabled: # Turn on da traps.
    disabled: 0
    enabled: 50

  trap_weight: # Unchanged
    1-Hit KO Trap: 2
    Invisible Trap: 2
    Item Lock Trap: 2
    No Ammo Trap: 2
    No Clank Trap: 2
    Wrench Only Trap: 2

  filler_weight: # More Player EXP less Bolts and Jackpot.
    Bolts: 1
    Jackpot: 1
    Player EXP: 10
    Weapon Level-Up: 5 # UNUSED NO PROGRESSIVE WEAPONS

  weapon_vendors: # Unchanged
    disabled: 50
    enabled: 0

  skill_points: # I have played this game too much I know ALL Skill Points from the back of my head.
    all: 99

  trophies: # I have played this game too much I know ALL Trophies from the back of my head.
    every_trophy: 99

  titanium_bolts: # I have played this game too much I know ALL Titanium Bolts from the back of my head.
    disabled: 0
    enabled: 50

  rangers: # Heck yeah I want to help my ranger boys.
    all: 99

  vidcomics: # Unchanged
    disabled: 0
    enabled: 50

  vr_challenges: # Unchanged
    disabled: 0
    enabled: 50

  arena: # Unchanged
    none: 0
    first_only: 0
    second_only: 0
    all: 50

  sewer_crystals: # Set to all.
    none: 0
    every_20: 0
    every_10: 0
    every_5: 0
    all: 50

  sewer_limitation: # This isn't changing until Bolts are useful properly.
    2: 99

  nanotech_milestones: # I want every Nanotech increase to give something. Means more effort, but allows for more diversity compared to collecting Titanium Bolts and Trophies and Skill Points. The more higher the more checks.
    none: 0
    every_20: 0
    every_10: 0
    every_5: 0
    all: 50

  nanotech_limitation: # Unchanged
    100: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-11-100: 0 # random value between 11 and 100

  ship_nose: # Randomly pick please.
    standard: 1
    split: 1
    scoop: 1

  ship_wings: # Randomly pick please.
    standard: 1
    hi_lift: 1
