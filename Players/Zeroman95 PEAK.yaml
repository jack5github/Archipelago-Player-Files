name: ZeromanPEAK{NUMBER}
description: |-
  Zeroman95's PEAK YAML File

game: PEAK
requires:
  version: 0.6.7

PEAK:
  progression_balancing:
    random-range-50-80: 99 # set to random-range-50-80 to give better items and to make the game go quicker.

  accessibility:
    full: 99 # Unchanged

  goal:
    reach_peak: 99 # Never done all Badges, never did karat; Not doing both Peak and Badges at the same time.
    complete_all_badges: 0
    24_karat_badge: 0
    peak_and_badges: 0

  ascent_count:
    0: 99

  badge_count:
    20: 99 # UNCHANGED NOT USING.
    random: 0
    random-low: 0
    random-high: 0
    random-range-1-54: 0

  progressive_stamina:
    'false': 0
    'true': 50 # Makes game more difficult, but challenging.

  additional_stamina_bars:
    'false': 50 # Changed to false because I completed the game basically before I reached 100% Stamina
    'true': 0

  ring_link:
    'false': 50 # Unchanged
    'true': 0

  hard_ring_link:
    'false': 50 # Unchanged
    'true': 0

  energy_link:
    'false': 0
    'true': 50 # Fun, and Dynamite.

  trap_link:
    'false': 0
    'true': 50 # Turned on because Jack5 PEAK has it enabled.

  death_link:
    'false': 0
    'true': 50 # Turned on because Jack5 PEAK has it enabled.

  death_link_behavior:
    kill_random_player: 0
    reset_to_last_checkpoint: 99 # Kill Random Player is too BRUTAL.

  death_link_send_behavior:
    any_player_dies: 0
    all_players_dead: 99 # Only works when the Game is over.

  trap_percentage:
    random-high: 99 # I have this set the same for Ratchet 3 and Hit and Run, but this might be too much so maybe turn it down next time.

  instant_death_trap_weight:
    # This sounds like Torture. So no.
    none: 50
    low: 0
    medium: 0
    high: 0

  items_to_bombs_weight:
    # Likelihood of receiving a trap which drops the currently held item and replaces it with Dynamite
