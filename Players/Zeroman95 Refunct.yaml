name: ZeromanRefunct{NUMBER}

description: Zeroman95s Refunct YAML

game: Refunct
requires:
  version: 0.6.7
  game:
    Refunct: 1.2.2

Refunct:
  progression_balancing: # Increased by 10.
    60: 99

  accessibility: # Unchanged
    full: 50
    minimal: 0

  amount_of_grass: # Sets a random amount of grass. I am not too worried about this.
    random-range-10-160: 99

  required_grass_percentage: # Set whatever amount of grass is required.
    random-range-50-100: 99

  goal: # Random Button or Platform... or Cube?
    button_31_1: 0
    button_1_1: 0
    random_known_button: 0
    random_unknown_button: 0
    platform_1_5: 0
    platform_21_1: 0
    platform_29_2: 0
    random_known_platform: 0
    random_unknown_platform: 0
    random_known: 0
    random_unknown: 99

  cubes: # Unchanged
    always: 0
    red_cubes_bag: 99
    never: 0

  extra_cubes: # Unchanged
    always: 0
    red_cubes_bag: 0
    green_cubes_bag: 99
    never: 0

  number_of_minigames: # No Mini-Games please.
    0: 99

  nerf_minigame_checks: # Unchanged (Mini-Games are set to 0)
    'false': 50
    'true': 0

  number_of_unlocks_per_minigame: # Unchanged (Mini-Games are set to 0)
    1: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-1-2: 0 # random value between 1 and 2

  minigames_likeliness: # Unchanged (Mini-Games are set to 0)
    Block Blub Minigame: 2
    Block Brawl Minigame: 5
    Button Galore Minigame: 2
    Climb Chaos Minigame: 1
    Climb Line Minigame: 1
    Climb Narrow Minigame: 1
    Climb Spiral Minigame: 1
    Clique: 1
    Funny Bridge Game Minigame: 1
    OG Randomizer Minigame: 5
    Rando Mountain Minigame: 5
    Refunct Mountain Minigame: 2
    Seeker Minigame: 2
    Vanilla Minigame: 2

  traps: # Add all unique traps.
    none: 0
    pretty: 0
    all: 99

  replace_flowers_by_traps: # 90% of all Flowers are traps.
    90: 99
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range--100-100: 0 # random value between -100 and 100

  rename_grass: # Unchanged
    none: 50
    english: 0
    latin: 0
    both: 0

  rename_flowers: # All Flowers are differently named.
    none: 0
    english: 0
    latin: 0
    both: 99

  death_link: # Death to all!
    'false': 0
    'true': 50

  local_items: []

  non_local_items: []

  start_inventory: {}

  start_hints: []

  start_location_hints: []

  exclude_locations: []

  priority_locations: []

  item_links:
    # Added from Jack5 Refunct YAML
    - name: Refunct Grab Bag
      item_pool:
        - Abilities
        - Clusters
        - Cubes Bags
      replacement_item: null
      skip_if_solo: true

  plando_items: []
